openapi: 3.1.0
info:
  title: Go Funny API
  version: 0.1.0
  summary: MVP API contract draft for trip expense sharing.
  description: >-
    This is an early draft used for frontend planning. The final OpenAPI spec
    should be owned and provided by the backend implementation.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Trips
  - name: Members
  - name: Expenses
  - name: Contributions
  - name: Settlement
  - name: Invitations
paths:
  /trips:
    get:
      tags: [Trips]
      operationId: getTrips
      summary: Get trip list
      responses:
        '200':
          description: Trip list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripSummary'
    post:
      tags: [Trips]
      operationId: createTrip
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequest'

  /trips/{tripId}:
    get:
      tags: [Trips]
      operationId: getTripById
      summary: Get trip detail
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Trips]
      operationId: updateTrip
      summary: Update trip
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/members:
    get:
      tags: [Members]
      operationId: getTripMembers
      summary: Get member list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Members]
      operationId: createTripMember
      summary: Add member
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemberRequest'
      responses:
        '201':
          description: Member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/members/{memberId}:
    delete:
      tags: [Members]
      operationId: deleteTripMember
      summary: Delete member
      parameters:
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/MemberId'
      responses:
        '204':
          description: Member deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/expenses:
    get:
      tags: [Expenses]
      operationId: getTripExpenses
      summary: Get expense list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Expense list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Expenses]
      operationId: createTripExpense
      summary: Create expense
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/expenses/{expenseId}:
    delete:
      tags: [Expenses]
      operationId: deleteTripExpense
      summary: Delete expense
      parameters:
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/ExpenseId'
      responses:
        '204':
          description: Expense deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/contributions:
    get:
      tags: [Contributions]
      operationId: getTripContributions
      summary: Get contribution list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Contribution list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contribution'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Contributions]
      operationId: createTripContribution
      summary: Create contribution
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContributionRequest'
      responses:
        '201':
          description: Contribution created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/settlement:
    get:
      tags: [Settlement]
      operationId: getTripSettlement
      summary: Get settlement result
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Settlement result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settlement'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/invitations:
    post:
      tags: [Invitations]
      operationId: createTripInvitation
      summary: Create invitation link
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{token}:
    get:
      tags: [Invitations]
      operationId: getInvitationByToken
      summary: Get invitation info by token
      parameters:
        - $ref: '#/components/parameters/InvitationToken'
      responses:
        '200':
          description: Invitation info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{token}/accept:
    post:
      tags: [Invitations]
      operationId: acceptInvitation
      summary: Accept invitation and join trip
      parameters:
        - $ref: '#/components/parameters/InvitationToken'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInvitationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
    InvitationToken:
      name: token
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TripMode:
      type: string
      enum: [expense, pool]

    SplitType:
      type: string
      enum: [equal_all, equal_selected, custom]

    Member:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    ExpenseSplit:
      type: object
      required: [memberId, amount]
      properties:
        memberId:
          type: string
        amount:
          type: number
          minimum: 0

    Expense:
      type: object
      required: [id, tripId, title, amount, splitType, participants, date]
      properties:
        id:
          type: string
        tripId:
          type: string
        title:
          type: string
        amount:
          type: number
          minimum: 0
        splitType:
          $ref: '#/components/schemas/SplitType'
        participants:
          type: array
          items:
            type: string
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'
        payerMemberId:
          type: [string, 'null']
        date:
          type: string
          format: date
        note:
          type: [string, 'null']

    Contribution:
      type: object
      required: [id, tripId, memberId, amount, date]
      properties:
        id:
          type: string
        tripId:
          type: string
        memberId:
          type: string
        amount:
          type: number
          minimum: 0
        date:
          type: string
          format: date

    SettlementRow:
      type: object
      required: [memberId, paid, share, net]
      properties:
        memberId:
          type: string
        paid:
          type: number
        share:
          type: number
        net:
          type: number

    SettlementTransfer:
      type: object
      required: [fromMemberId, toMemberId, amount]
      properties:
        fromMemberId:
          type: string
        toMemberId:
          type: string
        amount:
          type: number
          minimum: 0

    Settlement:
      type: object
      required: [tripId, mode, rows, transfers]
      properties:
        tripId:
          type: string
        mode:
          $ref: '#/components/schemas/TripMode'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/SettlementRow'
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/SettlementTransfer'

    InvitationRole:
      type: string
      enum: [editor]

    InvitationStatus:
      type: string
      enum: [active, accepted, expired, revoked]

    Invitation:
      type: object
      required: [tripId, token, role, status, inviteUrl]
      properties:
        tripId:
          type: string
        token:
          type: string
        role:
          $ref: '#/components/schemas/InvitationRole'
        status:
          $ref: '#/components/schemas/InvitationStatus'
        inviteUrl:
          type: string
        expiresAt:
          type: [string, 'null']
          format: date-time
        maxUses:
          type: [integer, 'null']
          minimum: 1
        createdByUserId:
          type: [string, 'null']

    CreateInvitationRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/InvitationRole'
        expiresAt:
          type: [string, 'null']
          format: date-time
        maxUses:
          type: [integer, 'null']
          minimum: 1

    AcceptInvitationRequest:
      type: object
      properties:
        displayName:
          type: [string, 'null']

    AcceptInvitationResponse:
      type: object
      required: [tripId, memberId]
      properties:
        tripId:
          type: string
        memberId:
          type: string
        collaboratorId:
          type: [string, 'null']

    TripSummary:
      type: object
      required: [id, title, mode, startDate, endDate]
      properties:
        id:
          type: string
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Trip:
      allOf:
        - $ref: '#/components/schemas/TripSummary'
        - type: object
          required: [members, expenses, contributions]
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/Member'
            expenses:
              type: array
              items:
                $ref: '#/components/schemas/Expense'
            contributions:
              type: array
              items:
                $ref: '#/components/schemas/Contribution'

    CreateTripRequest:
      type: object
      required: [title, mode, startDate, endDate]
      properties:
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    UpdateTripRequest:
      type: object
      properties:
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CreateMemberRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CreateExpenseRequest:
      type: object
      required: [title, amount, splitType, date]
      properties:
        title:
          type: string
        amount:
          type: number
          minimum: 0
        splitType:
          $ref: '#/components/schemas/SplitType'
        participants:
          type: array
          items:
            type: string
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'
        payerMemberId:
          type: [string, 'null']
        date:
          type: string
          format: date
        note:
          type: [string, 'null']

    CreateContributionRequest:
      type: object
      required: [memberId, amount, date]
      properties:
        memberId:
          type: string
        amount:
          type: number
          minimum: 0
        date:
          type: string
          format: date

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: [string, 'null']
        details:
          oneOf:
            - type: 'null'
            - type: object
              additionalProperties: true
