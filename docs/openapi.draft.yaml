openapi: 3.1.0
info:
  title: Go Funny API
  version: 0.1.0
  summary: MVP API contract for trip expense sharing.
servers:
  - url: http://localhost:3000/go-funny-api
    description: Local development server
tags:
  - name: Trips
  - name: Members
  - name: Expenses
  - name: Contributions
  - name: Settlement
  - name: Invitations

paths:
  /trips:
    get:
      tags: [Trips]
      operationId: getTrips
      summary: Get trip list
      responses:
        '200':
          description: Trip list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
    post:
      tags: [Trips]
      operationId: createTrip
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripSummary'
        '400':
          $ref: '#/components/responses/BadRequest'

  /trips/{tripId}:
    get:
      tags: [Trips]
      operationId: getTripById
      summary: Get trip detail with members, expenses, contributions
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Trips]
      operationId: updateTrip
      summary: Update trip
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Trips]
      operationId: deleteTrip
      summary: Delete trip
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '204':
          description: Trip deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /members/{tripId}:
    get:
      tags: [Members]
      operationId: getTripMembers
      summary: Get member list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'

  /members/{tripId}/{memberId}:
    delete:
      tags: [Members]
      operationId: deleteTripMember
      summary: Delete member
      parameters:
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/MemberId'
      responses:
        '204':
          description: Member deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /expenses/{tripId}:
    get:
      tags: [Expenses]
      operationId: getTripExpenses
      summary: Get expense list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Expense list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Expenses]
      operationId: createTripExpense
      summary: Create expense
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /expenses/{tripId}/{expenseId}:
    delete:
      tags: [Expenses]
      operationId: deleteTripExpense
      summary: Delete expense
      parameters:
        - $ref: '#/components/parameters/TripId'
        - $ref: '#/components/parameters/ExpenseId'
      responses:
        '204':
          description: Expense deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /contributions/{tripId}:
    get:
      tags: [Contributions]
      operationId: getTripContributions
      summary: Get contribution list
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Contribution list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contribution'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Contributions]
      operationId: createTripContribution
      summary: Create contribution
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContributionRequest'
      responses:
        '201':
          description: Contribution created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /settlement/{tripId}:
    get:
      tags: [Settlement]
      operationId: getTripSettlement
      summary: Get settlement result
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Settlement result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settlement'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{tripId}:
    post:
      tags: [Invitations]
      operationId: createTripInvitation
      summary: Create invitation link
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{token}:
    get:
      tags: [Invitations]
      operationId: getInvitationByToken
      summary: Get invitation info by token
      parameters:
        - $ref: '#/components/parameters/InvitationToken'
      responses:
        '200':
          description: Invitation info with trip data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationWithTrip'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{token}/accept:
    post:
      tags: [Invitations]
      operationId: acceptInvitation
      summary: Accept invitation and join trip
      parameters:
        - $ref: '#/components/parameters/InvitationToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvitationRequest'
      responses:
        '201':
          description: Invitation accepted, membership created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
    InvitationToken:
      name: token
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TripMode:
      type: string
      enum: [expense, pool]

    SplitType:
      type: string
      enum: [equal_all, equal_selected, custom]

    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Member:
      type: object
      required: [id, tripId, userId, createdAt, user]
      properties:
        id:
          type: string
        tripId:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    ExpenseSplit:
      type: object
      required: [id, expenseId, membershipId, amount, createdAt]
      properties:
        id:
          type: string
        expenseId:
          type: string
        membershipId:
          type: string
        amount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Expense:
      type: object
      required: [id, tripId, title, amount, date, splitType, createdAt]
      properties:
        id:
          type: string
        tripId:
          type: string
        title:
          type: string
        amount:
          type: integer
        date:
          type: string
          format: date-time
        splitType:
          $ref: '#/components/schemas/SplitType'
        payerMembershipId:
          type: [string, 'null']
        note:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'

    Contribution:
      type: object
      required: [id, tripId, membershipId, amount, date, createdAt]
      properties:
        id:
          type: string
        tripId:
          type: string
        membershipId:
          type: string
        amount:
          type: integer
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SettlementTransfer:
      type: object
      required: [from, to, amount]
      properties:
        from:
          type: string
        to:
          type: string
        amount:
          type: number

    Settlement:
      type: object
      required: [tripId, mode, transfers]
      properties:
        tripId:
          type: string
        mode:
          $ref: '#/components/schemas/TripMode'
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/SettlementTransfer'

    Invitation:
      type: object
      required: [id, tripId, token, role, usedCount, createdAt]
      properties:
        id:
          type: string
        tripId:
          type: string
        token:
          type: string
        role:
          type: string
          enum: [editor]
        maxUses:
          type: [integer, 'null']
        usedCount:
          type: integer
        expiresAt:
          type: [string, 'null']
          format: date-time
        acceptedAt:
          type: [string, 'null']
          format: date-time
        revokedAt:
          type: [string, 'null']
          format: date-time
        createdByUserId:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    InvitationWithTrip:
      allOf:
        - $ref: '#/components/schemas/Invitation'
        - type: object
          required: [trip]
          properties:
            trip:
              $ref: '#/components/schemas/TripSummary'

    TripSummary:
      type: object
      required: [id, title, mode, startDate, endDate, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Trip:
      allOf:
        - $ref: '#/components/schemas/TripSummary'
        - type: object
          required: [memberships, expenses, contributions]
          properties:
            memberships:
              type: array
              items:
                $ref: '#/components/schemas/Member'
            expenses:
              type: array
              items:
                $ref: '#/components/schemas/Expense'
            contributions:
              type: array
              items:
                $ref: '#/components/schemas/Contribution'

    CreateTripRequest:
      type: object
      required: [title, mode, startDate, endDate]
      properties:
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    UpdateTripRequest:
      type: object
      properties:
        title:
          type: string
        location:
          type: [string, 'null']
        mode:
          $ref: '#/components/schemas/TripMode'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CreateExpenseRequest:
      type: object
      required: [title, amount, splitType, date]
      properties:
        title:
          type: string
        amount:
          type: integer
          minimum: 0
        splitType:
          $ref: '#/components/schemas/SplitType'
        payerMembershipId:
          type: [string, 'null']
        date:
          type: string
          format: date
        note:
          type: [string, 'null']

    CreateContributionRequest:
      type: object
      required: [membershipId, amount, date]
      properties:
        membershipId:
          type: string
        amount:
          type: integer
          minimum: 0
        date:
          type: string
          format: date

    CreateInvitationRequest:
      type: object
      properties:
        createdByUserId:
          type: [string, 'null']

    AcceptInvitationRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
